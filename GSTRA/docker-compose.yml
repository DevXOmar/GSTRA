services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gstra-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.example
    volumes:
      - ./backend:/app
      - ./data:/data
    environment:
      GST_DATA_PATH: /data
      CHROMA_PERSIST_PATH: /app/chroma_db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gstra-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
